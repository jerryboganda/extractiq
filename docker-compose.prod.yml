# ─── ExtractIQ Production Docker Compose ───

services:
  # ── Infrastructure ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: extractiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mcq_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcq_user} -d ${POSTGRES_DB:-mcq_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - extractiq

  redis:
    image: redis:7-alpine
    container_name: extractiq-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - extractiq

  minio:
    image: minio/minio:latest
    container_name: extractiq-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - extractiq

  minio-init:
    image: minio/mc:latest
    container_name: extractiq-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set extractiq http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb extractiq/${S3_BUCKET:-mcq-platform} --ignore-existing;
      exit 0;
      "
    networks:
      - extractiq

  # ── Application ──
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: api
    container_name: extractiq-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:4000"
    env_file: ./Backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcq_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcq_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - extractiq
      - npm_network

  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: worker
    container_name: extractiq-worker
    restart: unless-stopped
    env_file: ./Backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcq_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcq_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - extractiq
      - npm_network

  # ── Frontend (Website + Web App) ──
  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    container_name: extractiq-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4101:80"
    networks:
      - extractiq
      - npm_network

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  extractiq:
    name: extractiq
    driver: bridge
  npm_network:
    external: true
    name: nginx-proxy-manager_default
