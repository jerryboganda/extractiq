# ─── ExtractIQ Production Docker Compose ───

services:
  # ── Infrastructure ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: extractiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mcq_platform}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-100}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcq_user} -d ${POSTGRES_DB:-mcq_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - extractiq

  redis:
    image: redis:7-alpine
    container_name: extractiq-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD} --timeout 0 --tcp-keepalive 60
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - extractiq

  minio:
    image: minio/minio:latest
    container_name: extractiq-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - extractiq

  minio-init:
    image: minio/mc:latest
    container_name: extractiq-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set extractiq http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb extractiq/${S3_BUCKET:-mcq-platform} --ignore-existing;
      exit 0;
      "
    networks:
      - extractiq

  # ── Application ──
  migrate:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: api
    restart: "no"
    env_file: ./Backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcq_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcq_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
    command: ["node", "scripts/run-migrations.js", "migrate", "--run"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - extractiq

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: api
    container_name: extractiq-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:4000"
    env_file: ./Backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcq_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcq_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      APP_BASE_URL: ${APP_BASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health/ready"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - extractiq

  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    env_file: ./Backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcq_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcq_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      WORKER_SHUTDOWN_TIMEOUT_MS: ${WORKER_SHUTDOWN_TIMEOUT_MS:-30000}
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      # Note: replicas is honored by swarm-compatible orchestrators.
      # For plain docker compose, scale with: docker compose up --scale worker=${WORKER_REPLICAS:-2}
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '1.0'
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - extractiq

  # ── Frontend (Website + Web App) ──
  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    container_name: extractiq-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4101:80"
    networks:
      - extractiq

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  extractiq:
    name: extractiq
    driver: bridge
